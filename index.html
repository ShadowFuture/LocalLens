<!DOCTYPE html>
<html>
<head>
    <title>LocalLens Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spectral:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        :root {
            --surface: #0f1729;
            --surface-strong: #1a2540;
            --text-primary: #e0f2fe;
            --text-secondary: #7dd3fc;
            --accent: #00d4ff;
            --accent-soft: rgba(0, 212, 255, 0.15);
            --border: rgba(0, 212, 255, 0.3);
            --color-neon: #00d4ff;
            --color-dark-blue: #001a4d;
            --color-light-blue: #0ea5e9;
        }

        body {
            background: linear-gradient(135deg, #0f1729 0%, #1a2b5c 50%, #001a4d 100%);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            min-height: 100vh;
        }

        h1 {
            font-family: 'Spectral', serif;
            font-size: 3rem;
            letter-spacing: -0.04em;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .card, .date-card {
            border: 2px solid var(--border);
            background: linear-gradient(135deg, #1a2540 0%, #0f3a7d 100%);
            border-radius: 22px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.35);
            border-color: var(--accent);
            transform: translateY(-4px);
        }

        .card {
            padding: 26px;
        }

        .card h4,
        .date-card h4 {
            margin-bottom: 1rem;
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }

        .card p,
        .card ul,
        .date-card div {
            margin-bottom: 0.8rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .list-group-item {
            border: 1px solid rgba(30, 37, 62, 0.08);
            border-radius: 16px;
            margin-bottom: 0.5rem;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .list-group-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(47, 72, 183, 0.08);
        }

        .date-card {
            padding: 28px;
            background: linear-gradient(135deg, #5b64e6 0%, #8e97ff 100%);
            color: #ffffff;
            box-shadow: 0 18px 50px rgba(18, 40, 109, 0.14);
        }

        .date-main {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .date-day {
            font-size: 1rem;
            opacity: 0.9;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 12px 14px;
        }

        .todo-item label {
            margin-bottom: 0;
            flex: 1;
            word-break: break-word;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .todo-item.completed label {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .todo-remove {
            border: none;
            background: transparent;
            color: #e11d48;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0;
            line-height: 1;
        }

        .form-control {
            border-radius: 14px;
            border: 2px solid var(--border);
            background: #0f1729;
            color: var(--text-primary);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.1);
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            background: #1a2540;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9 0%, #00d4ff 100%);
            border: 2px solid var(--accent);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
            font-weight: 600;
            transition: all 0.3s ease;
            color: #001a4d;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00d4ff 0%, #0ea5e9 100%);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
            transform: translateY(-2px);
        }

        .shadow {
            box-shadow: 0 18px 50px rgba(47, 72, 183, 0.06) !important;
        }

        #events-list {
            padding-left: 1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        #events-list li {
            margin-bottom: 0.5rem;
            line-height: 1.5;
            color: var(--text-primary);
        }

        .assistant-chat {
            display: flex;
            flex-direction: column;
            height: 300px;
            gap: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 12px;
            background: linear-gradient(135deg, rgba(15, 58, 125, 0.3) 0%, rgba(0, 212, 255, 0.05) 100%);
            border-radius: 14px;
            border: 2px solid var(--border);
            box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .message {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: 500;
        }

        .message.user {
            align-self: flex-end;
            max-width: 85%;
            background: linear-gradient(135deg, #0ea5e9 0%, #00d4ff 100%);
            color: #001a4d;
            margin-right: 4px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.5);
            font-weight: 600;
        }

        .message.assistant {
            align-self: flex-start;
            max-width: 85%;
            background: linear-gradient(135deg, #0f3a7d 0%, #1a2b5c 100%);
            color: var(--accent);
            margin-left: 4px;
            border: 2px solid var(--border);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.25);
        }

        .message-text {
            word-wrap: break-word;
            line-height: 1.4;
        }

        .chat-input-group {
            display: flex;
            gap: 8px;
        }

        #assistant-input {
            flex: 1;
        }

        .btn-send {
            background: linear-gradient(135deg, #0ea5e9 0%, #00d4ff 100%);
            color: #001a4d;
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-send:hover {
            background: linear-gradient(135deg, #00d4ff 0%, #0ea5e9 100%);
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(0, 212, 255, 0.5);
        }

        .btn-send:disabled {
            background: #334155;
            border-color: #334155;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            font-style: italic;
            padding: 10px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(79, 70, 229, 0.2);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-message {
            display: flex;
            align-items: center;
            color: var(--text-secondary);
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-4">
        <h1 class="text-center mb-4">LocalLens Dashboard</h1>

        <div class="row g-4">

            <!-- Weather Card -->
            <div class="col-md-3 col-12">
                <div class="card p-3 shadow">
                    <h4>Weather</h4>
                    <p id="temp"></p>
                    <p id="condition"></p>
                </div>
            </div>

            <!-- Air Quality Card -->
            <div class="col-md-3 col-12">
                <div class="card p-3 shadow">
                    <h4>Air Quality</h4>
                    <p id="aqi"></p>
                    <p id="aqi-category" style="font-style: italic;"></p>
                </div>
            </div>

            <!-- Date Card -->
            <div class="col-md-3 col-12">
                <div class="date-card">
                    <div class="date-main" id="date-main"></div>
                    <div class="date-day" id="date-day"></div>
                </div>
            </div>

            <!-- Joke Card -->
            <div class="col-md-3 col-12">
                <div class="card p-3 shadow">
                    <h4>Daily Joke</h4>
                    <p id="joke-setup" style="font-weight: 500;"></p>
                    <p id="joke-punchline" style="font-style: italic;"></p>
                    <button onclick="loadJoke()" class="btn btn-primary mt-2">New Joke</button>
                </div>
            </div>

            <!-- Events Card -->
            <div class="col-md-3 col-12">
                <div class="card p-3 shadow">
                    <h4>Local Events</h4>
                    <ul id="events-list"></ul>
                </div>
            </div>

            <!-- Todo Card -->
            <div class="col-md-3 col-12">
                <div class="card p-3 shadow">
                    <h4>To-Do List</h4>
                    <div class="mb-3">
                        <input id="todo-input" type="text" class="form-control" placeholder="Add a task and press Enter">
                    </div>
                    <ul id="todo-list" class="list-group"></ul>
                </div>
            </div>

            <!-- AI Assistant Card -->
            <div class="col-md-6 col-12">
                <div class="card p-3 shadow">
                    <h4>AI Assistant</h4>
                    <div class="assistant-chat">
                        <div class="chat-messages" id="chat-messages">
                            <div class="message assistant">
                                <div class="message-text">Hi! I'm LocalLens, your personal assistant. Ask me about the weather, air quality, local events, or anything else. I'll use current local data to help you!</div>
                            </div>
                        </div>
                        <div class="chat-input-group">
                            <input id="assistant-input" type="text" class="form-control" placeholder="Ask me something..." autocomplete="off">
                            <button class="btn-send" onclick="sendMessage()" id="send-btn">Send</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

<script>
    /* WEATHER */
    async function loadWeather() {
        const res = await fetch("/weather");
        const data = await res.json();
        document.getElementById("temp").innerText = `Temperature: ${data.temperature}°F`;
        document.getElementById("condition").innerText = `Wind: ${data.windspeed} mph`;
    }

    /* AIR QUALITY */
    async function loadAir() {
        const res = await fetch("/air");
        const data = await res.json();

        document.getElementById("aqi").innerText = `AQI: ${data.aqi}`;
        document.getElementById("aqi-category").innerText = data.category;
    }

    /* EVENTS */
    async function loadEvents() {
        const res = await fetch("/events");
        const events = await res.json();
        const list = document.getElementById("events-list");
        list.innerHTML = ""; // clear old items

        events.forEach(e => {
            const li = document.createElement("li");
            li.innerText = `${e.name} — ${e.time}`;
            list.appendChild(li);
        });
    }

    /* DATE */
    function loadDate() {
        const now = new Date();

        document.getElementById("date-main").innerText =
            now.toLocaleDateString("en-US", {
                month: "long",
                day: "numeric",
                year: "numeric"
            });

        document.getElementById("date-day").innerText =
            now.toLocaleDateString("en-US", { weekday: "long" });
    }

    /* JOKE */
    async function loadJoke() {
        try {
            const res = await fetch("/joke");
            const data = await res.json();

            document.getElementById("joke-setup").innerText = data.setup;
            document.getElementById("joke-punchline").innerText = data.punchline;
        } catch (error) {
            document.getElementById("joke-setup").innerText = "Error loading joke.";
            document.getElementById("joke-punchline").innerText = "";
        }
    }

    /* TODO LIST */
    const TODO_STORAGE_KEY = "locallens_todos";

    function getSavedTodos() {
        const saved = localStorage.getItem(TODO_STORAGE_KEY);
        return saved ? JSON.parse(saved) : [];
    }

    function saveTodos(todos) {
        localStorage.setItem(TODO_STORAGE_KEY, JSON.stringify(todos));
    }

    function renderTodos() {
        const list = document.getElementById("todo-list");
        list.innerHTML = "";
        const todos = getSavedTodos();

        todos.forEach((todo, index) => {
            const li = document.createElement("li");
            li.className = "list-group-item todo-item" + (todo.completed ? " completed" : "");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = todo.completed;
            checkbox.className = "form-check-input me-2";
            checkbox.addEventListener("change", () => {
                todos[index].completed = checkbox.checked;
                saveTodos(todos);
                renderTodos();
            });

            const label = document.createElement("label");
            label.innerText = todo.text;

            const removeButton = document.createElement("button");
            removeButton.type = "button";
            removeButton.className = "todo-remove";
            removeButton.innerText = "✕";
            removeButton.title = "Remove task";
            removeButton.addEventListener("click", () => {
                todos.splice(index, 1);
                saveTodos(todos);
                renderTodos();
            });

            li.appendChild(checkbox);
            li.appendChild(label);
            li.appendChild(removeButton);
            list.appendChild(li);
        });
    }

    document.getElementById("todo-input").addEventListener("keydown", event => {
        if (event.key === "Enter") {
            event.preventDefault();
            const input = event.target;
            const text = input.value.trim();
            if (!text) return;

            const todos = getSavedTodos();
            todos.push({ text, completed: false });
            saveTodos(todos);
            input.value = "";
            renderTodos();
        }
    });

    /* AI ASSISTANT */
    const chatMessages = document.getElementById("chat-messages");
    const assistantInput = document.getElementById("assistant-input");
    const sendBtn = document.getElementById("send-btn");

    function addMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        
        const msgText = document.createElement("div");
        msgText.className = "message-text";
        msgText.innerText = text;
        
        msgDiv.appendChild(msgText);
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addLoadingMessage() {
        const msgDiv = document.createElement("div");
        msgDiv.className = "message assistant";
        msgDiv.id = "loading-msg";
        
        const msgText = document.createElement("div");
        msgText.className = "loading-message";
        msgText.innerHTML = '<div class="spinner"></div>Thinking...';
        
        msgDiv.appendChild(msgText);
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
        const message = assistantInput.value.trim();
        if (!message) return;

        addMessage(message, "user");
        assistantInput.value = "";
        sendBtn.disabled = true;
        
        addLoadingMessage();

        try {
            const res = await fetch("/assistant", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: message })
            });

            const data = await res.json();

            // Remove loading message
            const loadingMsg = document.getElementById("loading-msg");
            if (loadingMsg) loadingMsg.remove();

            if (!res.ok) {
                addMessage(data.error || "Sorry, I encountered an error. Please try again.", "assistant");
                sendBtn.disabled = false;
                return;
            }

            addMessage(data.answer, "assistant");
        } catch (error) {
            addMessage("Error connecting to the assistant. Please try again.", "assistant");
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            assistantInput.focus();
        }
    }

    assistantInput.addEventListener("keydown", event => {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });

    /* LOAD EVERYTHING */
    loadWeather();
    loadAir();
    loadEvents();
    loadDate();
    loadJoke();
    renderTodos();
</script>

</body>
</html>
